name: Deploy Frontend (SST)

# Push a main que toca el front o la infra → `sst deploy`.
# SST también reconcilia App Runner/RDS/etc. (idempotente; el imageIdentifier sigue
# en :latest, así que no pelea con el auto-deploy del backend).
on:
  push:
    branches: [dev]
    paths:
      - "apps/web/**"
      - "packages/types/**"
      - "packages/ui/**"
      - "sst.config.ts"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build workspace packages (needed for next build)
        run: pnpm --filter @soe/types build && pnpm --filter @soe/db build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy with SST
        run: SST_BACKEND_READY=1 npx sst deploy --stage demo
